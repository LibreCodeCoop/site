name: Preview

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, closed]

# Least privilege: read the repo, write only the PR comment.
permissions:
  contents: read
  pull-requests: write

# Previews share a single deploy branch on the site-preview repo, so serialize
# runs to avoid concurrent pushes clobbering each other. Never cancel in-flight
# runs — a cancelled `closed` run would leave a stale preview behind.
concurrency:
  group: site-preview-deploy
  cancel-in-progress: false

jobs:
  deploy-preview:
    # Skip fork PRs (e.g. Weblate translations): secrets aren't available to
    # forks and a hosted preview needs the PREVIEW_TOKEN.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer

      - name: Install dependencies
        run: composer i

      # Point the build at the per-PR GitHub Pages subpath. The whole site
      # (links, images, and the mix() CSS/JS) is prefixed with baseUrl, so this
      # is all that's needed to make a sub-directory deploy resolve correctly.
      # Drop the prod Matomo container so previews don't pollute analytics.
      - name: Rewrite baseUrl for the preview subpath
        run: |
          PREVIEW_URL="https://librecodecoop.github.io/site-preview/pr-preview/pr-${{ github.event.pull_request.number }}/"
          sed -i "s|'baseUrl' => '/'|'baseUrl' => '${PREVIEW_URL}'|" config.php
          sed -i "/'matomo_container'/d" config.production.php
          grep "'baseUrl' => " config.php

      - name: Build site
        run: composer prod

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build_production/
          pages-base-url: librecodecoop.github.io/site-preview
          deploy-repository: LibreCodeCoop/site-preview
          preview-branch: main
          wait-for-pages-deployment: false
          token: ${{ secrets.PREVIEW_TOKEN }}
          comment: ${{ github.event.pull_request.user.type != 'Bot' }}
