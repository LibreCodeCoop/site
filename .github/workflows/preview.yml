name: Preview

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

# Least privilege: read the repo, write only the PR comment.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer

      - name: Install dependencies
        run: composer i

      - name: Build site
        run: composer prod

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-pr-${{ github.event.pull_request.number }}
          path: build_production/
          retention-days: 7

      - name: Comment preview instructions
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- preview-bot -->';
            const body = [
              marker,
              '## 🔍 Preview do site',
              '',
              '✅ O build deste PR foi gerado com sucesso.',
              '',
              '### Como visualizar',
              `1. Abra a [página desta execução](${runUrl})`,
              '2. Role até a seção **Artifacts**',
              `3. Baixe \`preview-pr-${prNumber}\``,
              '4. Descompacte e abra `index.html` no navegador',
              '',
              '🔄 Atualizado automaticamente a cada novo commit neste PR.',
              '',
              '<sub>Artefato disponível por 7 dias.</sub>'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
